name: Update Shelter Data

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and unzip data
        run: |
          # 国土地理院のオープンデータURL（CSV/GeoJSONを含むzip）
          # ※実際にはここを正しいURLに書き換えてください
          URL="https://nlftp.mlit.go.jp/ksj/gml/data_datalist/KsjTmplt-P20-v2_2.zip"
          curl -L -o data.zip $URL
          mkdir -p ./data
          unzip -o data.zip -d ./data
          rm data.zip

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # 変更がある場合のみコミット
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update shelter data"
            git push
          fi
