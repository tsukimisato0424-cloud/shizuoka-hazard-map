<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>防災ハザードマップ (Premium Design Pro)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
  html, body, #map { height: 100%; margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; }
  /* (※スタイル部分は前のコードと同じです。そのまま使えます) */
</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
// --- 地図の初期化 ---
const map = L.map('map', { zoomControl: false, minZoom: 5 }).setView([34.9756, 138.3828], 13);
L.control.zoom({ position: 'bottomright' }).addTo(map);

// --- 避難所タイルレイヤー（ここが重要！） ---
const shelterLayer = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/shelter/{z}/{x}/{y}.png', {
  attribution: '© 国土地理院',
  maxZoom: 18
});

// --- ハザード・避難所メニュー切り替え部分 ---
document.querySelectorAll('.hazard-btn').forEach(btn => {
  btn.onclick = function() {
    const type = this.getAttribute('data-type');
    this.classList.toggle('active');
    const isActive = this.classList.contains('active');
    
    if (type === 'shelter') {
      if (isActive) {
        shelterLayer.addTo(map); // タイルを表示
        const center = destination || currentLocation || map.getCenter();
        findNearestShelters(center.lat, center.lng).then(list => {
           console.log("近くの避難所:", list); // F12で確認可能
        });
      } else {
        map.removeLayer(shelterLayer);
      }
    } else {
      // 洪水・土砂・津波の切り替え処理
      const layerGroup = layers[type];
      if (isActive) { layerGroup.forEach(l => l.addTo(map)); } 
      else { layerGroup.forEach(l => map.removeLayer(l)); }
    }
  };
});

// --- 近い避難所を計算する関数 ---
async function findNearestShelters(lat, lng) {
  const url = `https://disaportaldata.gsi.go.jp/geojson/emergency_shelter.geojson`;
  try {
    const response = await fetch(url);
    const data = await response.json();
    return data.features
      .filter(f => f.geometry && f.geometry.coordinates)
      .map(f => ({ ...f, dist: map.distance([lat, lng], [f.geometry.coordinates[1], f.geometry.coordinates[0]]) }))
      .sort((a, b) => a.dist - b.dist)
      .slice(0, 5);
  } catch (e) { console.error("データ取得エラー", e); return []; }
}

// (※その他の検索機能やルート描画機能は、以前のコードをそのままここに続けて貼り付けてください)
</script>
</body>
</html>
