<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>防災ハザードマップ (Premium Design)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

<style>
html, body, #map { height: 100%; margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; }

/* 1. 検索バーを最上段に目一杯長く・スタイリッシュに */
.leaflet-top.leaflet-left {
  width: 100%;
  padding: 0 !important;
  box-sizing: border-box;
  z-index: 1100 !important; 
}
.leaflet-control-geocoder {
  margin: 10px !important;
  width: calc(100% - 20px) !important;
  max-width: none !important;
  border: none !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important;
  border-radius: 14px !important;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(8px);
  transition: all 0.3s ease;
}
.leaflet-control-geocoder:focus-within {
  box-shadow: 0 4px 25px rgba(26, 115, 232, 0.3) !important;
  background: #fff;
}
.leaflet-control-geocoder-form { width: 100%; display: flex; align-items: center; }
.leaflet-control-geocoder-form input {
  font-size: 16px !important;
  padding: 16px 20px !important;
  border: none !important;
  width: 100% !important;
  box-sizing: border-box;
  background: transparent !important;
  color: #202124;
}
.leaflet-control-geocoder-icon { display: none !important; }

/* 検索の候補リストを最前面に出す設定 */
.leaflet-control-geocoder-suggestions {
  z-index: 9999 !important;
  border-radius: 12px !important;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15) !important;
  border: none !important;
  margin-top: 8px !important;
  overflow: hidden;
}

.leaflet-control-layers { display: none !important; }

/* 2. 自作ハザード操作カード */
#hazardMenuCard {
  position: absolute;
  top: 75px;
  left: 10px;
  right: 10px;
  z-index: 1000; 
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  display: flex;
  justify-content: space-between;
  gap: 6px;
}
.hazard-btn {
  flex: 1;
  border: none;
  border-radius: 12px;
  padding: 10px 2px;
  background: #fff;
  color: #5f6368;
  font-size: 11px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  box-shadow: 0 3px 6px rgba(0,0,0,0.06), inset 0 -2px 0 rgba(0,0,0,0.1);
  transition: all 0.2s ease;
}
.hazard-btn .material-icons-round { font-size: 22px; }

.hazard-btn.active[data-type="flood"] {
  background: linear-gradient(135deg, #2f80ed, #0056b3); color: #fff;
  box-shadow: 0 4px 12px rgba(47, 128, 237, 0.4), inset 0 -2px 0 rgba(0,0,0,0.2);
}
.hazard-btn.active[data-type="landslide"] {
  background: linear-gradient(135deg, #f2994a, #d35400); color: #fff;
  box-shadow: 0 4px 12px rgba(242, 153, 74, 0.4), inset 0 -2px 0 rgba(0,0,0,0.2);
}
.hazard-btn.active[data-type="tsunami"] {
  background: linear-gradient(135deg, #00c6ff, #0072ff); color: #fff;
  box-shadow: 0 4px 12px rgba(0, 198, 255, 0.4), inset 0 -2px 0 rgba(0,0,0,0.2);
}
.hazard-btn.active[data-type="shelter"] {
  background: linear-gradient(135deg, #27ae60, #1e8449); color: #fff;
  box-shadow: 0 4px 12px rgba(39, 174, 96, 0.4), inset 0 -2px 0 rgba(0,0,0,0.2);
}

/* 【新規】徒歩・車ルート＆所要時間表示パネル */
#routingTimePanel {
  position: absolute;
  bottom: 110px;
  left: 10px;
  right: 10px;
  z-index: 1000;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 12px 16px;
  box-shadow: 0 6px 25px rgba(0,0,0,0.15);
  display: none; /* ルート検索されるまで非表示 */
  flex-direction: column;
  gap: 10px;
}
.mode-selector {
  display: flex;
  background: #f1f3f4;
  border-radius: 10px;
  padding: 2px;
}
.mode-btn {
  flex: 1;
  border: none;
  background: transparent;
  padding: 8px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: bold;
  color: #5f6368;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.mode-btn.active {
  background: #fff;
  color: #1a73e8;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
.time-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 2px 4px;
}
.time-result {
  font-size: 22px;
  font-weight: 900;
  color: #202124;
}
.distance-result {
  font-size: 14px;
  color: #70757a;
  font-weight: bold;
}

/* 右側に配置する開閉式の凡例コンテナ */
#legendWrapper {
  position: absolute;
  top: 175px;
  right: 10px;
  z-index: 1000;
  display: none; 
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}
#legendToggleBtn {
  border: none;
  border-radius: 20px;
  padding: 8px 14px;
  background: #fff;
  color: #1a73e8;
  font-size: 11px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.15);
}

#legendCard {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  border-radius: 12px;
  padding: 12px 14px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
  width: 170px;
  max-height: 200px;
  overflow-y: auto;
  display: none; 
  font-size: 11px;
  color: #333;
}
.legend-group { margin-bottom: 12px; }
.legend-group:last-child { margin-bottom: 0; }
.legend-group h4 { margin: 0 0 6px 0; font-size: 12px; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 3px; }
.legend-item { display: flex; align-items: center; margin-bottom: 4px; font-weight: 500; }
.legend-color { width: 22px; height: 12px; margin-right: 8px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.2); flex-shrink: 0; }

/* 3. フローティング現在地ボタン */
#locationBtn {
  position: absolute; right: 20px; bottom: 30px; z-index: 1000;
  width: 60px; height: 60px; border: none; border-radius: 50%;
  background: linear-gradient(135deg, #ffffff, #f1f3f4); color: #1a73e8;
  cursor: pointer;
  box-shadow: 0 6px 166px rgba(0,0,0,0.2), inset 0 -3px 0 rgba(0,0,0,0.1);
  display: flex; align-items: center; justify-content: center;
}
#locationBtn .material-icons-round { font-size: 28px; }

.leaflet-routing-container { display: none !important; }
</style>
</head>
<body>

<div id="map"></div>

<div id="hazardMenuCard">
  <button class="hazard-btn" data-type="flood">
    <span class="material-icons-round">water</span>洪水想定
  </button>
  <button class="hazard-btn" data-type="landslide">
    <span class="material-icons-round">landscape</span>土砂災害
  </button>
  <button class="hazard-btn" data-type="tsunami">
    <span class="material-icons-round">tsunami</span>津波浸水
  </button>
  <button class="hazard-btn" data-type="shelter">
    <span class="material-icons-round">gite</span>避難場所
  </button>
</div>

<div id="routingTimePanel">
  <div class="mode-selector">
    <button class="mode-btn active" id="modeCar" onclick="changeRouteMode('car')">
      <span class="material-icons-round">directions_car</span>車
    </button>
    <button class="mode-btn" id="modeWalk" onclick="changeRouteMode('foot')">
      <span class="material-icons-round">directions_walk</span>徒歩
    </button>
  </div>
  <div class="time-info">
    <div class="time-result" id="routeTime">-- 分</div>
    <div class="distance-result" id="routeDistance">-- km</div>
  </div>
</div>

<div id="legendWrapper">
  <button id="legendToggleBtn">
    <span class="material-icons-round" id="toggleIcon">info</span><span id="toggleText">凡例を表示</span>
  </button>
  <div id="legendCard"></div>
</div>

<button id="locationBtn"><span class="material-icons-round">my_location</span></button>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
const map = L.map('map', { zoomControl: false }).setView([34.9756, 138.3828], 8);

L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
  attribution: '© 国土地理院'
}).addTo(map);

const layers = {
  flood: [L.tileLayer('https://disaportaldata.gsi.go.jp/raster/01_flood_l2_shinsuishin_data/{z}/{x}/{y}.png', { opacity: 0.6, maxZoom: 17 })],
  landslide: [
    L.tileLayer('https://disaportaldata.gsi.go.jp/raster/05_dosekiryukeikaikuiki/{z}/{x}/{y}.png', { opacity: 0.7, maxZoom: 17 }), 
    L.tileLayer('https://disaportaldata.gsi.go.jp/raster/05_kyukeishakeikaikuiki/{z}/{x}/{y}.png', { opacity: 0.7, maxZoom: 17 }), 
    L.tileLayer('https://disaportaldata.gsi.go.jp/raster/05_jisuberikeikaikuiki/{z}/{x}/{y}.png', { opacity: 0.7, maxZoom: 17 })  
  ],
  tsunami: [L.tileLayer('https://disaportaldata.gsi.go.jp/raster/04_tsunami_newlegend_data/{z}/{x}/{y}.png', { opacity: 0.6, maxZoom: 17 })],
  shelter: [L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/hinanbasho/{z}/{x}/{y}.png', { opacity: 0.9, maxZoom: 18 })]
};

const legendData = {
  flood: {
    title: "洪水浸水深",
    items: [
      { color: "#74006A", text: "20m以上" },
      { color: "#B800D6", text: "10m 〜 20m" },
      { color: "#FF55FF", text: "5.0m 〜 10m" },
      { color: "#FF9999", text: "3.0m 〜 5.0m" },
      { color: "#FFFF73", text: "0.5m 〜 3.0m" },
      { color: "#E6F2FF", text: "0.5m未満" }
    ]
  },
  landslide: {
    title: "土砂災害区分",
    items: [
      { color: "#FF0000", text: "特別警戒 (レッド)" },
      { color: "#FFCC00", text: "警戒区域 (イエロー)" }
    ]
  },
  tsunami: {
    title: "津波浸水深",
    items: [
      { color: "#B800D6", text: "10m以上" },
      { color: "#FF55FF", text: "5.0m 〜 10m" },
      { color: "#FF9999", text: "3.0m 〜 5.0m" },
      { color: "#FFFF73", text: "1.0m 〜 3.0m" },
      { color: "#A3FF73", text: "0.3m 〜 1.0m" },
      { color: "#CCFFFF", text: "0.3m未満" }
    ]
  },
  shelter: {
    title: "指定緊急避難場所",
    items: [
      { color: "#27ae60", text: "公式避難マーク" }
    ]
  }
};

function updateLegend() {
  const legendWrapper = document.getElementById('legendWrapper');
  const legendCard = document.getElementById('legendCard');
  const activeBtns = document.querySelectorAll('.hazard-btn.active');
  
  if (activeBtns.length === 0) {
    legendWrapper.style.display = 'none';
    legendCard.style.display = 'none';
    resetToggleButton();
    return;
  }
  
  let html = '';
  activeBtns.forEach(btn => {
    const type = btn.getAttribute('data-type');
    const data = legendData[type];
    
    html += `<div class="legend-group"><h4>${data.title}</h4>`;
    data.items.forEach(item => {
      html += `
        <div class="legend-item">
          <div class="legend-color" style="background-color: ${item.color};"></div>
          <span>${item.text}</span>
        </div>`;
    });
    html += `</div>`;
  });
  
  legendCard.innerHTML = html;
  legendWrapper.style.display = 'flex'; 
}

function resetToggleButton() {
  document.getElementById('toggleText').innerText = "凡例を表示";
  document.getElementById('toggleIcon').innerText = "info";
}

document.getElementById('legendToggleBtn').onclick = function() {
  const legendCard = document.getElementById('legendCard');
  const toggleText = document.getElementById('toggleText');
  const toggleIcon = document.getElementById('toggleIcon');
  
  if (legendCard.style.display === 'none' || legendCard.style.display === '') {
    legendCard.style.display = 'block';
    toggleText.innerText = "凡例を閉じる";
    toggleIcon.innerText = "close";
  } else {
    legendCard.style.display = 'none';
    toggleText.innerText = "凡例を表示";
    toggleIcon.innerText = "info";
  }
};

document.querySelectorAll('.hazard-btn').forEach(btn => {
  btn.onclick = function() {
    const type = this.getAttribute('data-type');
    this.classList.toggle('active');
    
    if (this.classList.contains('active')) {
      layers[type].forEach(layer => layer.addTo(map));
    } else {
      layers[type].forEach(layer => map.removeLayer(layer));
    }
    
    updateLegend();
  };
});

let currentLocation = null, destination = null, routingControl = null, currentMarker = null, destMarker = null;
let currentMode = 'car'; // 初期状態は車モード

function updateCurrentLocation(isInitial = false) {
  navigator.geolocation.getCurrentPosition(pos => {
    currentLocation = L.latLng(pos.coords.latitude, pos.coords.longitude);
    
    if (currentMarker) map.removeLayer(currentMarker);
    currentMarker = L.marker(currentLocation).addTo(map).bindPopup("現在地").openPopup();
    
    if (isInitial || !destination) {
      map.setView(currentLocation, 15);
    }
    
    if (destination) drawRoute();
    
  }, err => {
    console.error("現在地取得失敗: " + err.code);
    if (!isInitial) alert("現在地を取得できませんでした。位置情報サービスをONにしてください。");
  }, { enableHighAccuracy: true });
}

updateCurrentLocation(true);

// 【大幅改良】モード別にルートと時間を計算して表示する機能
function drawRoute() {
  if (!currentLocation || !destination) return;
  
  if (routingControl) {
    map.removeControl(routingControl);
    routingControl = null;
  }
  
  // モードに応じたOSRMの無料APIサーバーを切り替える
  let serviceUrl = 'https://router.project-osrm.org/route/v1'; // 車（標準）
  if (currentMode === 'foot') {
    serviceUrl = 'https://routing.openstreetmap.de/routed-foot/route/v1'; // 徒歩用のOSRMデモサーバー
  }
  
  routingControl = L.Routing.control({
    waypoints: [currentLocation, destination],
    router: L.Routing.osrmv1({ serviceUrl: serviceUrl }),
    routeWhileDragging: false,
    addWaypoints: false,
    draggableWaypoints: false,
    lineOptions: {
      styles: [{ color: currentMode === 'car' ? '#1a73e8' : '#e67e22', opacity: 0.8, weight: 6 }]
    }
  }).addTo(map);

  // 時間と距離のデータを取得してUIに反映するイベントリスナー
  routingControl.on('routesfound', function(e) {
    const routes = e.routes;
    const summary = routes[0].summary;
    
    // 距離 (メートルからキロメートルへ)
    const distance = (summary.totalDistance / 1000).toFixed(1);
    // 時間 (秒から分へ)
    const min = Math.round(summary.totalTime / 60);
    
    document.getElementById('routeTime').innerText = min + " 分";
    document.getElementById('routeDistance').innerText = distance + " km";
    document.getElementById('routingTimePanel').style.display = 'flex'; // パネルを表示
  });
}

// 【新規】ボタンで車・徒歩を切り替える関数
function changeRouteMode(mode) {
  currentMode = mode;
  document.getElementById('modeCar').classList.toggle('active', mode === 'car');
  document.getElementById('modeWalk').classList.toggle('active', mode === 'foot');
  drawRoute(); // ルートを再計算
}

const arcgisGeocoder = L.Control.Geocoder.gis(); 
const nominatimGeocoder = L.Control.Geocoder.nominatim();

const geocoderControl = L.Control.geocoder({
  geocoder: arcgisGeocoder, 
  defaultMarkGeocode: false,
  placeholder: " 🔍 番地、住所、施設名を入力...",
  collapsed: false
}).addTo(map);

geocoderControl.on("markgeocode", e => { processSearchResult(e.geocode); });

const searchInput = geocoderControl._input;
searchInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    const query = searchInput.value;
    if (!query) return;

    arcgisGeocoder.geocode(query, function(arcResults) {
      if (arcResults && arcResults.length > 0) {
        processSearchResult(arcResults[0]);
      } else {
        nominatimGeocoder.geocode(query, function(nomResults) {
          if (nomResults && nomResults.length > 0) {
            processSearchResult(nomResults[0]);
          } else {
            alert("場所が見つかりませんでした。別のキーワード（番地や正式名称）を試してください。");
          }
        });
      }
    });
  }
});

function processSearchResult(geocodeTarget) {
  const lat = geocodeTarget.center.lat;
  const lng = geocodeTarget.center.lng;
  destination = L.latLng(lat, lng); 

  if (destMarker) map.removeLayer(destMarker);
  destMarker = L.marker(destination).addTo(map).bindPopup(geocodeTarget.name).openPopup();
  
  if (currentLocation) {
    drawRoute();
    const bounds = L.latLngBounds([currentLocation, destination]);
    map.fitBounds(bounds, { padding: [60, 120] }); 
  } else {
    map.setView(destination, 17); 
  }
}

document.getElementById("locationBtn").onclick = () => {
  updateCurrentLocation(false);
};
</script>
</body>
</html>
