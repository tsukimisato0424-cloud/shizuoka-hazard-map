<title>防災ハザードマップ (Premium Design)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>

html, body, #map { height: 100%; margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; }

/* 1. 検索バーを最上段に目一杯長く・スタイリッシュに */
.leaflet-top.leaflet-left {
  width: 100%;
  padding: 0 !important;
  box-sizing: border-box;
  z-index: 1100 !important; 
}
.leaflet-control-geocoder {
  margin: 10px !important;
  width: calc(100% - 20px) !important;
  max-width: none !important;
  border: none !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important;
  border-radius: 14px !important;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(8px);
  transition: all 0.3s ease;
}
.leaflet-control-geocoder:focus-within {
  box-shadow: 0 4px 25px rgba(26, 115, 232, 0.3) !important;
  background: #fff;
}
.leaflet-control-geocoder-form { width: 100%; display: flex; align-items: center; }
.leaflet-control-geocoder-form input {
  font-size: 16px !important;
  padding: 16px 20px !important;
  border: none !important;
  width: 100% !important;
  box-sizing: border-box;
  background: transparent !important;
  color: #202124;
}
.leaflet-control-geocoder-icon { display: none !important; }

/* 検索の候補リストを最前面に出す設定 */
.leaflet-control-geocoder-suggestions {
  z-index: 9999 !important;
  border-radius: 12px !important;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15) !important;
  border: none !important;
  margin-top: 8px !important;
  overflow: hidden;
}

.leaflet-control-layers { display: none !important; }

/* 2. 自作ハザード操作カード（避難所追加に伴いボタンを4つに横並び） */
#hazardMenuCard {
  position: absolute;
  top: 75px;
  left: 10px;
  right: 10px;
  z-index: 1000; 
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  display: flex;
  justify-content: space-between;
  gap: 6px;
}
.hazard-btn {
  flex: 1;
  border: none;
  border-radius: 12px;
  padding: 10px 2px;
  background: #fff;
  color: #5f6368;
  font-size: 11px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  box-shadow: 0 3px 6px rgba(0,0,0,0.06), inset 0 -2px 0 rgba(0,0,0,0.1);
  transition: all 0.2s ease;
}
.hazard-btn .material-icons-round { font-size: 22px; }

.hazard-btn.active[data-type="flood"] {
  background: linear-gradient(135deg, #2f80ed, #0056b3); color: #fff;
  box-shadow: 0 4px 12px rgba(47, 128, 237, 0.4), inset 0 -2px 0 rgba(0,0,0,0.2);
}
.hazard-btn.active[data-type="landslide"] {
  background: linear-gradient(135deg, #f2994a, #d35400); color: #fff;
  box-shadow: 0 4px 12px rgba(242, 153, 74, 0.4), inset 0 -2px 0 rgba(0,0,0,0.2);
}
.hazard-btn.active[data-type="tsunami"] {
  background: linear-gradient(135deg, #00c6ff, #0072ff); color: #fff;
  box-shadow: 0 4px 12px rgba(0, 198, 255, 0.4), inset 0 -2px 0 rgba(0,0,0,0.2);
}
/* 避難所ボタンのアクティブ色（セーフティグリーン） */
.hazard-btn.active[data-type="shelter"] {
  background: linear-gradient(135deg, #27ae60, #1e8449); color: #fff;
  box-shadow: 0 4px 12px rgba(39, 174, 96, 0.4), inset 0 -2px 0 rgba(0,0,0,0.2);
}
