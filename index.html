<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>防災ハザードマップ (自動ルート検索版)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
html, body, #map { height: 100%; margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }

/* 検索バーを最上段に目一杯広げるスタイル */
.leaflet-top.leaflet-left {
  width: 100%;
  padding-right: 16px;
  box-sizing: border-box;
}
.leaflet-control-geocoder {
  margin: 12px 0 0 16px !important;
  width: calc(100% - 16px) !important;
  max-width: none !important;
  border: none !important;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15) !important;
  border-radius: 8px !important;
  background: #fff;
}
.leaflet-control-geocoder-form {
  width: 100%;
  display: flex;
}
.leaflet-control-geocoder-form input {
  font-size: 16px !important;
  padding: 14px 16px !important;
  border: none !important;
  width: 100% !important;
  box-sizing: border-box;
}
.leaflet-control-geocoder-icon { display: none !important; }

/* レイヤーコントロールのスタイル調整 */
.leaflet-control-layers {
  margin-top: 75px !important;
  border: none !important;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15) !important;
  border-radius: 8px !important;
  padding: 10px !important;
  font-size: 14px;
}

/* フローティング現在地ボタン（念のため手動更新用にも残してあります） */
#locationBtn {
  position: absolute; right: 20px; bottom: 30px; z-index: 1000;
  width: 56px; height: 56px; border: none; border-radius: 50%;
  background: #fff; color: #1a73e8; font-size: 24px; cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  display: flex; align-items: center; justify-content: center;
}
.leaflet-routing-container { display: none !important; }
</style>
</head>
<body>

<div id="map"></div>
<button id="locationBtn"><span class="material-icons">my_location</span></button>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
// マップ初期化（初期位置は静岡周辺ですが、自動現在地で上書きされます）
const map = L.map('map', { zoomControl: false }).setView([34.9756, 138.3828], 8);

L.control.zoom({ position: 'bottomright' }).addTo(map);

// ベースマップ（国土地理院 淡色地図）
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
  attribution: '© 国土地理院'
}).addTo(map);

// 最新ハザードマップデータの定義
const flood = L.tileLayer.wms('https://disaportaldata.gsi.go.jp/wms/shinsuishin?', {
  layers: '01_flood_l2_shinsuishin', format: 'image/png', transparent: true, opacity: 0.6
});
const landslide = L.tileLayer.wms('https://disaportaldata.gsi.go.jp/wms/dosakukeikai?', {
  layers: '05_dosekiryukeikaikuiki,05_kyushunkyushachikukeikaikuiki,05_jisubirikeikaikuiki', format: 'image/png', transparent: true, opacity: 0.7
});
const tsunami = L.tileLayer('https://pref-shizuoka.geocloud.jp/public/wms/tile/tsunami_shinsui/{z}/{x}/{y}.png', { opacity: 0.6 });

L.control.layers(null, { 
  "【最新】洪水（想定最大規模）": flood, 
  "【最新】土砂災害警戒区域": landslide, 
  "【静岡県公式】津波浸水想定": tsunami 
}, { position: "topleft", collapsed: false }).addTo(map);

let currentLocation = null, destination = null, routingControl = null, currentMarker = null, destMarker = null;

// 現在地を取得する共通関数
function updateCurrentLocation(isInitial = false) {
  navigator.geolocation.getCurrentPosition(pos => {
    currentLocation = L.latLng(pos.coords.latitude, pos.coords.longitude);
    
    if (currentMarker) map.removeLayer(currentMarker);
    currentMarker = L.marker(currentLocation).addTo(map).bindPopup("現在地").openPopup();
    
    // 初回読み込み時、またはルートがない場合は現在地にズーム
    if (isInitial || !destination) {
      map.setView(currentLocation, 15);
    }
    
    // すでに目的地が検索されていればルートを再描画
    if (destination) drawRoute();
    
  }, err => {
    console.error("現在地取得失敗: " + err.code);
    if (!isInitial) alert("現在地を取得できませんでした。位置情報の設定を確認してください。");
  }, { enableHighAccuracy: true });
}

// 💻【追加】ページを開いた瞬間に自動で現在地を取得する
updateCurrentLocation(true);

// ルート描画関数
function drawRoute() {
  if (!currentLocation || !destination) return;
  if (routingControl) map.removeControl(routingControl);
  
  routingControl = L.Routing.control({
    waypoints: [currentLocation, destination],
    routeWhileDragging: false,
    addWaypoints: false,
    draggableWaypoints: false,
    lineOptions: {
      styles: [{ color: '#1a73e8', opacity: 0.8, weight: 6 }]
    }
  }).addTo(map);
}

// 検索コントロール
L.Control.geocoder({
  geocoder: L.Control.Geocoder.nominatim({
    geocodingQueryParams: { "accept-language": "ja", "countrycodes": "jp", "addressdetails": 1 }
  }),
  defaultMarkGeocode: false,
  placeholder: " 🔍 番地、住所、施設名を入力...",
  collapsed: false
})
.on("markgeocode", e => {
  const lat = e.geocode.center.lat;
  const lng = e.geocode.center.lng;
  destination = L.latLng(lat, lng); 

  if (destMarker) map.removeLayer(destMarker);
  destMarker = L.marker(destination).addTo(map).bindPopup(e.geocode.name).openPopup();
  
  // ⚡【修正】検索完了したら「直ちに」ルートを描画
  if (currentLocation) {
    drawRoute();
    // 現在地と目的地が両方収まるように地図の表示範囲を自動調整
    const bounds = L.latLngBounds([currentLocation, destination]);
    map.fitBounds(bounds, { padding: [50, 50] });
  } else {
    // 万が一、現在地がまだ取れていない場合は検索先に飛ぶ
    map.setView(destination, 17);
    alert("現在地を判定中です。少し待ってから自動でルートが表示されます。");
  }
}).addTo(map);

// 右下のボタンを押したときも現在地を更新
document.getElementById("locationBtn").onclick = () => {
  updateCurrentLocation(false);
};
</script>
</body>
</html>
