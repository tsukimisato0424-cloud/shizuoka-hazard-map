<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>防災ハザードマップ (完全版)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
html, body, #map { height: 100%; margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }

/* 検索バーを最上段に目一杯広げるスタイル */
.leaflet-top.leaflet-left {
  width: 100%;
  padding-right: 16px;
  box-sizing: border-box;
}
.leaflet-control-geocoder {
  margin: 12px 0 0 16px !important;
  width: calc(100% - 16px) !important;
  max-width: none !important;
  border: none !important;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15) !important;
  border-radius: 8px !important;
  background: #fff;
}
.leaflet-control-geocoder-form {
  width: 100%;
  display: flex;
}
.leaflet-control-geocoder-form input {
  font-size: 16px !important;
  padding: 14px 16px !important;
  border: none !important;
  width: 100% !important;
  box-sizing: border-box;
}
.leaflet-control-geocoder-icon { display: none !important; }

/* レイヤーコントロールのスタイル調整 */
.leaflet-control-layers {
  margin-top: 75px !important;
  border: none !important;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15) !important;
  border-radius: 8px !important;
  padding: 10px !important;
  font-size: 14px;
}

/* フローティング現在地ボタン */
#locationBtn {
  position: absolute; right: 20px; bottom: 30px; z-index: 1000;
  width: 56px; height: 56px; border: none; border-radius: 50%;
  background: #fff; color: #1a73e8; font-size: 24px; cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.1s;
}
#locationBtn:hover { background: #f8f9fa; }
#locationBtn:active { transform: scale(0.95); }

/* ルートテキスト案内は非表示 */
.leaflet-routing-container { display: none !important; }
</style>
</head>
<body>

<div id="map"></div>
<button id="locationBtn"><span class="material-icons">my_location</span></button>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
// マップ初期化
const map = L.map('map', { zoomControl: false }).setView([34.9756, 138.3828], 8);

// ズームボタンを右下に配置
L.control.zoom({ position: 'bottomright' }).addTo(map);

// ベースマップ（国土地理院 淡色地図）
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
  attribution: '© 国土地理院'
}).addTo(map);

// 🔄 【ここを修正】国土地理院の最新URL「disaportaldata.gsi.go.jp」に差し替えました
const flood = L.tileLayer('https://disaportaldata.gsi.go.jp/raster/01_flood_l2_shinsuishin_data/{z}/{x}/{y}.png', { opacity: 0.6, maxZoom: 17 });
const landslide = L.tileLayer('https://disaportaldata.gsi.go.jp/raster/05_dosekiryukeikaikuiki/{z}/{x}/{y}.png', { opacity: 0.7, maxZoom: 17 });
const tsunami = L.tileLayer('https://disaportaldata.gsi.go.jp/raster/04_tsunami_newlegend_data/{z}/{x}/{y}.png', { opacity: 0.6, maxZoom: 17 });

// レイヤーコントロールを左上に配置（チェックを入れると重なる、初期はすべてオフ）
L.control.layers(null, { 
  "洪水（想定最大規模）": flood, 
  "土砂災害警戒区域": landslide, 
  "津波浸水想定": tsunami 
}, { 
  position: "topleft", 
  collapsed: false 
}).addTo(map);

let currentLocation = null, destination = null, routingControl = null, currentMarker = null, destMarker = null;

// 現在地を取得する共通関数
function updateCurrentLocation(isInitial = false) {
  navigator.geolocation.getCurrentPosition(pos => {
    currentLocation = L.latLng(pos.coords.latitude, pos.coords.longitude);
    
    if (currentMarker) map.removeLayer(currentMarker);
    currentMarker = L.marker(currentLocation).addTo(map).bindPopup("現在地").openPopup();
    
    if (isInitial || !destination) {
      map.setView(currentLocation, 15);
    }
    
    if (destination) drawRoute();
    
  }, err => {
    console.error("現在地取得失敗: " + err.code);
    if (!isInitial) alert("現在地を取得できませんでした。位置情報サービスをONにしてください。");
  }, { enableHighAccuracy: true });
}

// 💻 ページを開いた瞬間に自動で現在地を取得
updateCurrentLocation(true);

// ルート描画関数
function drawRoute() {
  if (!currentLocation || !destination) return;
  if (routingControl) map.removeControl(routingControl);
  
  routingControl = L.Routing.control({
    waypoints: [currentLocation, destination],
    routeWhileDragging: false,
    addWaypoints: false,
    draggableWaypoints: false,
    lineOptions: {
      styles: [{ color: '#1a73e8', opacity: 0.8, weight: 6 }]
    }
  }).addTo(map);
}

// 検索コントロール（住所・番地・施設名対応）
L.Control.geocoder({
  geocoder: L.Control.Geocoder.nominatim({
    geocodingQueryParams: { "accept-language": "ja", "countrycodes": "jp", "addressdetails": 1 }
  }),
  defaultMarkGeocode: false,
  placeholder: " 🔍 番地、住所、施設名を入力...",
  collapsed: false
})
.on("markgeocode", e => {
  const lat = e.geocode.center.lat;
  const lng = e.geocode.center.lng;
  destination = L.latLng(lat, lng); 

  if (destMarker) map.removeLayer(destMarker);
  destMarker = L.marker(destination).addTo(map).bindPopup(e.geocode.name).openPopup();
  
  if (currentLocation) {
    drawRoute();
    const bounds = L.latLngBounds([currentLocation, destination]);
    map.fitBounds(bounds, { padding: [60, 60] });
  } else {
    map.setView(destination, 17);
    alert("現在地を読み込み中です。位置情報が許可されると自動でルートが繋がります。");
  }
}).addTo(map);

// 右下のボタンを押したときも現在地を更新
document.getElementById("locationBtn").onclick = () => {
  updateCurrentLocation(false);
};
</script>
</body>
</html>
