<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>防災ハザードマップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<style>
html,body,#map{height:100%;margin:0}
#locationBtn{
position:absolute;right:12px;bottom:20px;z-index:1000;
padding:12px 16px;border:none;border-radius:999px;
background:#1976d2;color:#fff;font-size:16px;cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,.35)}
</style>
</head>
<body>
<div id="map"></div>
<button id="locationBtn">📍現在地</button>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
const map=L.map('map').setView([34.9756,138.3828],8);
let currentLocation=null,destination=null,routingControl=null,currentMarker=null,destMarker=null;

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);

const flood=L.tileLayer('https://disaportal.gsi.go.jp/raster/01_flood_l2_shinsuishin_data/{z}/{x}/{y}.png',{opacity:.6});
const landslide=L.tileLayer('https://disaportal.gsi.go.jp/raster/05_dosekiryukeikaikuiki/{z}/{x}/{y}.png',{opacity:.7});
const tsunami=L.tileLayer('https://disaportal.gsi.go.jp/raster/04_tsunami_newlegend_data/{z}/{x}/{y}.png',{opacity:.6});

L.control.layers(null,{"洪水":flood,"土砂災害":landslide,"津波":tsunami},{position:"topleft"}).addTo(map);

function drawRoute(){
 if(!currentLocation||!destination)return;
 if(routingControl)map.removeControl(routingControl);
 routingControl=L.Routing.control({
   waypoints:[currentLocation,destination],
   routeWhileDragging:false,
   addWaypoints:false,
   draggableWaypoints:false
 }).addTo(map);
}

L.Control.geocoder({defaultMarkGeocode:false})
.on("markgeocode",e=>{
 destination=e.geocode.center;
 if(destMarker)map.removeLayer(destMarker);
 destMarker=L.marker(destination).addTo(map).bindPopup(e.geocode.name).openPopup();
 map.setView(destination,15);
 drawRoute();
}).addTo(map);

document.getElementById("locationBtn").onclick=()=>{
 navigator.geolocation.getCurrentPosition(pos=>{
   currentLocation=L.latLng(pos.coords.latitude,pos.coords.longitude);
   if(currentMarker)map.removeLayer(currentMarker);
   currentMarker=L.marker(currentLocation).addTo(map).bindPopup("現在地").openPopup();
   map.setView(currentLocation,15);
   drawRoute();
 },err=>alert("現在地取得失敗: "+err.code));
};
</script>
</body></html>
