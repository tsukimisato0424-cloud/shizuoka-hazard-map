<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>防災ハザードマップ (GoogleMap風)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
html, body, #map { height: 100%; margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }

/* 検索バーをGoogleマップ風にカスタマイズ */
.leaflet-control-geocoder {
  border: none !important;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2) !important;
  border-radius: 8px !important;
  overflow: hidden;
  margin-top: 16px !important;
  margin-left: 16px !important;
}
.leaflet-control-geocoder-form input {
  font-size: 15px !important;
  padding: 12px !important;
  border: none !important;
  width: 240px !important;
}

/* レイヤーコントロールの位置調整 */
.leaflet-control-layers {
  margin-top: 16px !important;
  border: none !important;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2) !important;
  border-radius: 8px !important;
}

/* フローティング現在地ボタン */
#locationBtn {
  position: absolute; right: 20px; bottom: 30px; z-index: 1000;
  width: 56px; height: 56px; border: none; border-radius: 50%;
  background: #fff; color: #1a73e8; font-size: 24px; cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.1s;
}
#locationBtn:hover { background: #f8f9fa; }
#locationBtn:active { transform: scale(0.95); }

/* ルート検索のテキスト案内パネルを非表示にする（Googleマップ風にスッキリ） */
.leaflet-routing-container { display: none !important; }
</style>
</head>
<body>

<div id="map"></div>
<button id="locationBtn"><span class="material-icons">my_location</span></button>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
// 初期位置（今回は国土地理院の淡色地図をベースに採用してスッキリさせています）
const map = L.map('map', { zoomControl: false }).setView([34.9756, 138.3828], 8);

// Googleマップの右下風にズームボタンを配置
L.control.zoom({ position: 'bottomright' }).addTo(map);

// ベースマップ（OpenStreetMapから国土地理院の淡色地図に変更。ハザードが見やすくなります）
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
  attribution: '© 国土地理院'
}).addTo(map);

// ハザードマップレイヤー
const flood = L.tileLayer('https://disaportal.gsi.go.jp/raster/01_flood_l2_shinsuishin_data/{z}/{x}/{y}.png', { opacity: 0.6 });
const landslide = L.tileLayer('https://disaportal.gsi.go.jp/raster/05_dosekiryukeikaikuiki/{z}/{x}/{y}.png', { opacity: 0.7 });
const tsunami = L.tileLayer('https://disaportal.gsi.go.jp/raster/04_tsunami_newlegend_data/{z}/{x}/{y}.png', { opacity: 0.6 });

// レイヤーコントロールを右上（Googleマップのレイヤー切り替え位置風）に配置
L.control.layers(null, { "洪水": flood, "土砂災害": landslide, "津波": tsunami }, { position: "topright" }).addTo(map);

let currentLocation = null, destination = null, routingControl = null, currentMarker = null, destMarker = null;

// ルート描画関数
function drawRoute() {
  if (!currentLocation || !destination) return;
  if (routingControl) map.removeControl(routingControl);
  
  routingControl = L.Routing.control({
    waypoints: [currentLocation, destination],
    routeWhileDragging: false,
    addWaypoints: false,
    draggableWaypoints: false,
    // Googleマップ風の青い太線にするためのスタイル設定
    lineOptions: {
      styles: [{ color: '#1a73e8', opacity: 0.8, weight: 6 }]
    }
  }).addTo(map);
}

// 検索コントロール（左上に配置、プレースホルダーを設定）
L.Control.geocoder({
  defaultMarkGeocode: false,
  placeholder: "場所を検索...",
  collapsed: false // 最初から検索窓を開いた状態にする（Googleマップ風）
})
.on("markgeocode", e => {
  destination = e.geocode.center;
  if (destMarker) map.removeLayer(destMarker);
  destMarker = L.marker(destination).addTo(map).bindPopup(e.geocode.name).openPopup();
  map.setView(destination, 15);
  drawRoute();
}).addTo(map);

// 現在地ボタンの処理
document.getElementById("locationBtn").onclick = () => {
  navigator.geolocation.getCurrentPosition(pos => {
    currentLocation = L.latLng(pos.coords.latitude, pos.coords.longitude);
    if (currentMarker) map.removeLayer(currentMarker);
    currentMarker = L.marker(currentLocation).addTo(map).bindPopup("現在地").openPopup();
    map.setView(currentLocation, 15);
    drawRoute();
  }, err => alert("現在地取得失敗: " + err.code), { enableHighAccuracy: true });
};
</script>
</body>
</html>
