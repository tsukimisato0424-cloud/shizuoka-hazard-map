<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shizuoka Hazard Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
}

#map {
    width: 100%;
    height: 100vh;
}

#locationBtn{
    position:absolute;
    top:10px;
    right:10px;
    z-index:1000;
    background:#fff;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,.3);
    cursor:pointer;
}
</style>

</head>

<body>

<button id="locationBtn">📍現在地</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([34.9756,138.3828],8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
}).addTo(map);
// 洪水
const flood = L.tileLayer(
  'https://disaportal.gsi.go.jp/raster/01_flood_l2_shinsuishin_data/{z}/{x}/{y}.png',
  {
    opacity: 0.6,
    attribution: '国土地理院'
  }
);

// 土砂災害
const landslide = L.tileLayer(
  'https://disaportal.gsi.go.jp/raster/05_dosekiryukeikaikuiki/{z}/{x}/{y}.png',
  {
    opacity: 0.7,
    attribution: '国土地理院'
  }
);

// 津波
const tsunami = L.tileLayer(
  'https://disaportal.gsi.go.jp/raster/04_tsunami_newlegend_data/{z}/{x}/{y}.png',
  {
    opacity: 0.6,
    attribution: '国土地理院'
  }
);

// レイヤー切替
L.control.layers(null, {
  "洪水": flood,
  "土砂災害": landslide,
  "津波": tsunami
},
                 {
                     position:"topleft"
                 }
                ).addTo(map);document.getElementById("locationBtn").onclick=function(){

navigator.geolocation.getCurrentPosition(function(pos){

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

map.setView([lat,lng],15);

L.marker([lat,lng]).addTo(map)
.bindPopup("現在地")
.openPopup();

});

};

</script>

</body>
</html>
