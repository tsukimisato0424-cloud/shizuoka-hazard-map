<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>防災ハザードマップ (Premium Design)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

<style>
html, body, #map { height: 100%; margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; }

/* 1. 検索バーを最上段に目一杯長く・スタイリッシュに */
.leaflet-top.leaflet-left {
  width: 100%;
  padding: 0 !important;
  box-sizing: border-box;
  z-index: 1100 !important; 
}
.leaflet-control-geocoder {
  margin: 10px !important;
  width: calc(100% - 20px) !important;
  max-width: none !important;
  border: none !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important;
  border-radius: 14px !important;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(8px);
  transition: all 0.3s ease;
}
.leaflet-control-geocoder:focus-within {
  box-shadow: 0 4px 25px rgba(26, 115, 232, 0.3) !important;
  background: #fff;
}
.leaflet-control-geocoder-form { width: 100%; display: flex; align-items: center; }
.leaflet-control-geocoder-form input {
  font-size: 16px !important;
  padding: 16px 20px !important;
  border: none !important;
  width: 100% !important;
  box-sizing: border-box;
  background: transparent !important;
  color: #202124;
}
.leaflet-control-geocoder-icon { display: none !important; }

/* 検索の候補リストを最前面に出す設定 */
.leaflet-control-geocoder-suggestions {
  z-index: 9999 !important;
  border-radius: 12px !important;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15) !important;
  border: none !important;
  margin-top: 8px !important;
  overflow: hidden;
}

.leaflet-control-layers { display: none !important; }

/* 2. 自作ハザード操作カード */
#hazardMenuCard {
  position: absolute;
  top: 75px;
  left: 10px;
  right: 10px;
  z-index: 1000; 
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  display: flex;
  justify-content: space-between;
  gap: 6px;
}
.hazard-btn {
  flex: 1;
  border: none;
  border-radius: 12px;
  padding: 10px 2px;
  background: #fff;
  color: #5f6368;
  font-size: 11px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  box-shadow: 0 3px 6px rgba(0,0,0,0.06), inset 0 -2px 0 rgba(0,0,0,0.1);
  transition: all 0.2s ease;
}
.hazard-btn .material-icons-round { font-size: 22px; }

.hazard-btn.active[data-type="flood"] {
  background: linear-gradient(135deg, #2f80ed, #0056b3); color: #fff;
  box-shadow: 0 4px 12px rgba(47, 128, 237, 0.4), inset 0 -2px 0 rgba(0,0,0,0.2);
}
.hazard-btn.active[data-type="landslide"] {
  background: linear-gradient(135deg, #f2994a, #d35400); color: #fff;
  box-shadow: 0 4px 12px rgba(242, 153, 74, 0.4), inset 0 -2px 0 rgba(0,0,0,0.2);
}
.hazard-btn.active[data-type="tsunami"] {
  background: linear-gradient(135deg, #00c6ff, #0072ff); color: #fff;
  box-shadow: 0 4px 12px rgba(0, 198, 255, 0.4), inset 0 -2px 0 rgba(0,0,0,0.2);
}
.hazard-btn.active[data-type="shelter"] {
  background: linear-gradient(135deg, #27ae60, #1e8449); color: #fff;
  box-shadow: 0 4px 12px rgba(39, 174, 96, 0.4), inset 0 -2px 0 rgba(0,0,0,0.2);
}

/* 徒歩・車ルート＆所要時間表示パネル */
#routingTimePanel {
  position: absolute;
  bottom: 110px;
  left: 10px;
  right: 10px;
  z-index: 1000;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 12px 16px;
  box-shadow: 0 6px 25px rgba(0,0,0,0.15);
  display: none; 
  flex-direction: column;
  gap: 10px;
}
.mode-selector {
  display: flex;
  background: #f1f3f4;
  border-radius: 10px;
  padding: 2px;
}
.mode-btn {
  flex: 1;
  border: none;
  background: transparent;
  padding: 8px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: bold;
  color: #5f6368;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.mode-btn.active {
  background: #fff;
  color: #1a73e8;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
.time-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 2px 4px;
}
.time-result {
  font-size: 22px;
  font-weight: 900;
  color: #202124;
}
.distance-result {
  font-size: 14px;
  color: #70757a;
  font-weight: bold;
}

/* 右側に配置する開閉式の凡例コンテナ */
#legendWrapper {
  position: absolute;
  top: 175px;
  right: 10px;
  z-index: 1000;
  display: none; 
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}
#legendToggleBtn {
  border: none;
  border-radius: 20px;
  padding: 8px 14px;
  background: #fff;
  color: #1a73e8;
  font-size: 11px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.15);
}

#legendCard {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  border-radius: 12px;
  padding: 12px 14px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
  width: 170px;
  max-height: 200px;
  overflow-y: auto;
  display: none; 
  font-size: 11px;
  color: #333;
}
.legend-group { margin-bottom: 12px; }
.legend-group:last-child { margin-bottom: 0; }
.legend-group h4 { margin: 0 0 6px 0; font-size: 12px; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 3px; }
.legend-item { display: flex; align-items: center; margin-bottom: 4px; font-weight: 500; }
.legend-color { width: 22px; height: 12px; margin-right: 8px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.2); flex-shrink: 0; }

/* 3. フローティング現在地ボタン */
#locationBtn {
  position: absolute; right: 20px; bottom: 30px; z-index: 1000;
  width: 60px; height: 60px; border: none; border-radius: 50%;
  background: linear-gradient(135deg, #ffffff, #f1f3f4); color: #1a73e8;
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(0,0,0,0.2), inset 0 -3px 0 rgba(0,0,0,0.1);
  display: flex; align-items: center; justify-content: center;
}
#locationBtn .material-icons-round { font-size: 28px; }

.leaflet-routing-container { display: none !important; }
</style>
</head>
<body>

<div id="map"></div>

<div id="hazardMenuCard">
  <button class="hazard-btn" data-type="flood">
    <span class="material-icons-round">water</span>洪水想定
  </button>
  <button class="hazard-btn" data-type="landslide">
    <span class="material-icons-round">landscape</span>土砂災害
  </button>
  <button class="hazard-btn" data-type="tsunami">
    <span class="material-icons-round">tsunami</span>津波浸水
  </button>
  <button class="hazard-btn" data-type="shelter">
    <span class="material-icons-round">gite</span>避難場所
  </button>
</div>

<div id="routingTimePanel">
  <div class="mode-selector">
    <button class="mode-btn active" id="modeCar" onclick="changeRouteMode('car')">
      <span class="material-icons-round">directions_car</span>車
    </button>
    <button class="mode-btn" id="modeWalk" onclick="changeRouteMode('foot')">
      <span class="material-icons-round">directions_walk</span>徒歩
    </button>
  </div>
  <div class="time-info">
    <div class="time-result" id="timeValue">-- 分</div>
    <div class="distance-result" id="distanceValue">-- km</div>
  </div>
</div>

<button id="locationBtn">
  <span class="material-icons-round">my_location</span>
</button>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
// 1. 地図の初期化
const map = L.map('map').setView([35.681236, 139.767125], 13);

// 2. 背景地図を「国土地理院 淡色地図」に変更
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://maps.gsi.go.jp/development/ichiran.html">国土地理院</a>'
}).addTo(map);

// 3. 検索バーの追加
const geocoder = L.Control.geocoder({
  defaultMarkGeocode: true,
  placeholder: "住所や場所を検索...",
  collapsed: false
}).addTo(map);

// 4. 現在地取得機能の実装
let currentLocationMarker = null;

document.getElementById('locationBtn').addEventListener('click', function() {
  if (!navigator.geolocation) {
    alert("お使いのブラウザは位置情報（GPS）に対応していません。");
    return;
  }

  // 位置情報の取得を開始
  navigator.geolocation.getCurrentPosition(
    function(position) {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;

      // すでに現在地マーカーがある場合は削除して再作成
      if (currentLocationMarker) {
        map.removeLayer(currentLocationMarker);
      }

      // 現在地にマーカーを設置し、地図の中心を移動
      currentLocationMarker = L.marker([lat, lng]).addTo(map)
        .bindPopup("現在の位置").openPopup();
      
      map.setView([lat, lng], 15); // 少しズームインする
    },
    function(error) {
      switch(error.code) {
        case error.PERMISSION_DENIED:
          alert("位置情報の利用が許可されていません。ブラウザや端末の設定を確認してください。");
          break;
        case error.POSITION_UNAVAILABLE:
          alert("位置情報が取得できませんでした（電波状況など）。");
          break;
        case error.TIMEOUT:
          alert("位置情報の取得がタイムアウトしました。");
          break;
        default:
          alert("位置情報の取得中にエラーが発生しました。");
          break;
      }
    },
    {
      enableHighAccuracy: true, // 高精度な位置情報を要求
      timeout: 10000,
      maximumAge: 0
    }
  );
});

// ハザードメニュー切り替え（枠組み）
document.querySelectorAll('.hazard-btn').forEach(button => {
  button.addEventListener('click', function() {
    this.classList.toggle('active');
  });
});

// ルート変更関数のダミー
function changeRouteMode(mode) {
  document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
  if(mode === 'car') document.getElementById('modeCar').classList.add('active');
  if(mode === 'foot') document.getElementById('modeWalk').classList.add('active');
}
</script>

</body>
</html>
